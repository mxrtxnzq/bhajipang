<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaji Pang | บาจีปัง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; color: #2D4F3B; }
        .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; background: #e5e7eb; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .goog-te-banner-frame { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 bg-[#FDFBF7]/95 backdrop-blur z-40 p-4 border-b border-green-900/10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="image_063d00.png" class="w-8 h-8 object-contain">
                <h1 class="font-bold text-lg">Bhaji Pang</h1>
            </div>
            <div id="google_translate_element"></div>
        </div>
    </header>

    <main id="menu-container" class="max-w-md mx-auto mt-4 px-4">
        <div id="loading" class="space-y-6">
            <div class="skeleton h-8 w-1/3 rounded"></div>
            <div class="space-y-4"><div class="skeleton h-24 w-full rounded-2xl"></div><div class="skeleton h-24 w-full rounded-2xl"></div></div>
        </div>
    </main>

    <div id="error-overlay" class="fixed inset-0 flex items-center justify-center bg-black/60 hidden z-50 p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-green-900/10">
            <div class="text-red-500 text-5xl mb-4">⚠️</div>
            <h3 class="font-bold text-xl mb-2 text-green-900">เกิดข้อผิดพลาด</h3>
            <p id="error-msg" class="text-green-900/60 mb-8 text-sm">ไม่สามารถโหลดข้อมูลเมนูได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>
            <button onclick="location.reload()" class="bg-[#2D4F3B] text-white px-8 py-3 rounded-full w-full font-bold shadow-lg shadow-green-900/20 active:scale-95 transition-transform">ลองใหม่อีกครั้ง</button>
        </div>
    </div>

    <button onclick="openCart()" class="fixed bottom-6 right-6 bg-[#2D4F3B] text-white p-4 rounded-full shadow-lg">
        ตะกร้า (<span id="cart-count">0</span>)
    </button>
    <button onclick="accessAdmin()" class="fixed bottom-6 left-6 text-[#2D4F3B] opacity-30 hover:opacity-100 text-xs transition-opacity">Admin</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7w2MAQN9LRWivD8B7h0zPyqZhIyGFYJk",
            authDomain: "bhajipang-366db.firebaseapp.com",
            projectId: "bhajipang-366db",
            storageBucket: "bhajipang-366db.firebasestorage.app",
            messagingSenderId: "799553816032",
            appId: "1:799553816032:web:12158ffda4f5826b3e1785",
            measurementId: "G-P2EXTMKD1Y"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'bhajipang-366db'; // ตั้งค่าตาม Project ID

        window.showError = (msg) => {
            document.getElementById('loading').classList.add('hidden');
            const overlay = document.getElementById('error-overlay');
            if(msg) document.getElementById('error-msg').innerText = msg;
            overlay.classList.remove('hidden');
        };

        signInAnonymously(auth).then(() => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'menu'), (snap) => {
                menuItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (error) => {
                console.error("Firestore Error:", error);
                showError("ไม่สามารถเข้าถึงฐานข้อมูลเมนูได้ กรุณาตรวจสอบสิทธิ์การเข้าถึง");
            });
        }).catch(err => {
            showError("ไม่สามารถเชื่อมต่อกับระบบได้");
        });

        let menuItems = [];
        window.render = () => {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            if (menuItems.length === 0) {
                container.innerHTML = '<div class="text-center opacity-50 mt-10">ยังไม่มีเมนูอาหาร</div>';
                return;
            }
            const categories = [...new Set(menuItems.map(i => i.category))];
            
            categories.forEach(cat => {
                container.innerHTML += `<h2 class="text-xl font-bold mb-3 mt-6 text-[#2D4F3B]">${cat}</h2>`;
                menuItems.filter(i => i.category === cat).forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl mb-3 shadow-sm border border-green-900/5">
                            <div class="flex gap-4">
                                <img src="${item.imageUrl || ''}" onerror="this.src='https://placehold.co/100x100/FDFBF7/2D4F3B?text=Menu'" class="w-20 h-20 rounded-xl object-cover bg-gray-100">
                                <div class="flex-grow">
                                    <h3 class="font-bold text-green-900">${item.name}</h3>
                                    <p class="text-sm opacity-60">${item.price} ฿</p>
                                    <button onclick="addToCart('${item.id}')" class="mt-2 text-xs bg-[#2D4F3B] text-white px-3 py-1 rounded-lg">เพิ่มลงตะกร้า</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        };

        window.accessAdmin = () => {
            const pass = prompt("ใส่รหัสผ่าน Admin:");
            if (pass === "6499") window.location.href = "admin.html";
            else if (pass) alert("รหัสผิด");
        };
    </script>

    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({includedLanguages: 'en,zh-CN,ms,hi'}, 'google_translate_element');
        }
    </script>
</body>
</html>
