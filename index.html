  // can call e.g. fb.collection(...) without re-importing.
  window.fb = { ...firestoreModule, ...storageModule };
}

// Save a finished order to the "orders" collection in Firestore.
async function saveOrderToFirebase(order) {
  if (!USE_FIREBASE || !db) return null;
  const docRef = await window.fb.addDoc(window.fb.collection(db, "orders"), {
    ...order,
    createdAt: new Date(),
    status: "pending",
  });
  return docRef.id;
}

// Load menu items from the "menuItems" collection in Firestore.
async function fetchMenuFromFirebase() {
  if (!USE_FIREBASE || !db) return null;
  const snapshot = await window.fb.getDocs(window.fb.collection(db, "menuItems"));
  return snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
}

// Upload a menu item image to Firebase Storage and get back its public URL.
async function uploadMenuImage(file, path) {
  if (!USE_FIREBASE || !storage) return "";
  const storageRef = window.fb.ref(storage, `images/${path}/${file.name}`);
  await window.fb.uploadBytes(storageRef, file);
  return await window.fb.getDownloadURL(storageRef);
}

// ==================== 4. APP STATE ====================
// One plain object holding everything the UI depends on. Whenever a value
// in here changes, call render() (see bottom of file) to redraw the page.

const state = {
  lang: 'TH',
  cart: [],
  menu: DEFAULT_MENU,
  isCartOpen: false,
  searchTerm: '',
  activeCategory: 1,
  isLoading: false,
  error: null,
  custModalItem: null,     // the menu item currently open in the customize modal
  selectedBreadType: 'bun',
  selectedSweetness: 'normal',
  customerNote: '',
};

// ==================== 5. DATA HELPERS ====================

// Escapes text the customer typed (search box, notes) before it's dropped
// back into an HTML template, so characters like " < > & don't break the page.
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Shortcut to the translation strings for the currently selected language.
function t() {
  return translations[state.lang];
}

// Menu items currently visible, after applying the category filter and search box.
function getFilteredMenu() {
  return state.menu.filter(item => {
    const matchesCategory = state.activeCategory === 1 || item.category === state.activeCategory;
    const term = state.searchTerm.toLowerCase();
    const matchesSearch = term === '' ||
      item.th.toLowerCase().includes(term) ||
      item.en.toLowerCase().includes(term);
    return matchesCategory && matchesSearch;
  });
}

function getTotalItems() {
  return state.cart.reduce((sum, item) => sum + item.qty, 0);
}

function getTotalPrice() {
  return state.cart.reduce((sum, item) => sum + item.price * item.qty, 0);
}

// Pulls the menu from Firebase (if turned on), otherwise just keeps DEFAULT_MENU.
async function loadMenuData() {
  state.isLoading = true;
  state.error = null;
  render();

  try {
    if (USE_FIREBASE) {
      const items = await fetchMenuFromFirebase();
      state.menu = (items && items.length > 0) ? items : DEFAULT_MENU;
    } else {
      state.menu = DEFAULT_MENU;
    }
  } catch (err) {
    console.error('Error loading menu:', err);
    state.error = t().errorLoading;
  } finally {
    state.isLoading = false;
    render();
  }
}

// ==================== 6. ACTIONS ====================
// These are the functions referenced by onclick="...", onchange="..." etc.
// in the HTML produced by render(). They mutate `state` and then re-render.

function setLang(lang) {
  state.lang = lang;
  render();
}

function setActiveCategory(catId) {
  state.activeCategory = catId;
  render();
}

function onSearchInput(value) {
  state.searchTerm = value;
  render();
}

function toggleCart(open) {
  state.isCartOpen = open;
  render();
}

function addToCart(itemId) {
  const item = state.menu.find(m => m.id === itemId);
  if (!item) return;

  if (item.isCustomizable) {
    // Open the customize modal instead of adding immediately.
    state.custModalItem = item;
    state.selectedBreadType = 'bun';
    state.selectedSweetness = 'normal';
    state.customerNote = '';
  } else {
    const uniqueId = `${item.id}-${Date.now()}`;
    state.cart.push({ ...item, uniqueId, qty: 1 });
  }
  render();
}

function closeCustomizeModal() {
  state.custModalItem = null;
  render();
}

function selectBreadType(value) {
  state.selectedBreadType = value;
  render();
}

function selectSweetness(value) {
  state.selectedSweetness = value;
  render();
}

function onNoteInput(value) {
  state.customerNote = value;
  // No render() here: re-rendering on every keystroke would rebuild the
  // textarea and lose cursor position. The value is already stored.
}

function confirmCustomization() {
  if (!state.custModalItem) return;
  const item = state.custModalItem;
  const uniqueId = `${item.id}-${Date.now()}`;
  state.cart.push({
    ...item,
    uniqueId,
    qty: 1,
    selectedBreadType: state.selectedBreadType,
    selectedSweetness: state.selectedSweetness,
    customNotes: state.customerNote,
  });
  state.custModalItem = null;
  state.selectedBreadType = 'bun';
  state.selectedSweetness = 'normal';
  state.customerNote = '';
  render();
}

function removeFromCart(uniqueId) {
  state.cart = state.cart.filter(item => item.uniqueId !== uniqueId);
  render();
}

function updateQty(uniqueId, delta) {
  state.cart = state.cart.map(item =>
    item.uniqueId === uniqueId
      ? { ...item, qty: Math.max(1, item.qty + delta) }
      : item
  );
  render();
}

async function confirmOrder() {
  const order = {
    items: state.cart,
    totalPrice: getTotalPrice(),
    totalItems: getTotalItems(),
  };

  try {
    await saveOrderToFirebase(order);
  } catch (err) {
    console.error('Error saving order:', err);
    // We still let the customer's flow complete even if saving failed —
    // the screen is shown to staff regardless. Adjust this if you'd
    // rather block on a successful save.
  }

  alert('สั่งอาหารสำเร็จ / Order completed!');
  state.cart = [];
  state.isCartOpen = false;
  render();
}

// Expose everything used by inline on... attributes, since this script
// runs as a module (module-scope functions aren't global by default).
Object.assign(window, {
  setLang, setActiveCategory, onSearchInput, toggleCart, addToCart,
  closeCustomizeModal, selectBreadType, selectSweetness, onNoteInput,
  confirmCustomization, removeFromCart, updateQty, confirmOrder, loadMenuData,
});

        </div>
      </div>

      <div class="relative">
        <i data-lucide="search" width="18" height="18" class="absolute left-3 top-3 text-stone-400"></i>
        <input type="text" placeholder="${tr.searchPlaceholder}" value="${escapeHtml(state.searchTerm)}"
          oninput="onSearchInput(this.value)"
          class="w-full pl-10 pr-4 py-2.5 rounded-lg bg-white/95 text-stone-800 placeholder-stone-400 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
      </div>
    </header>`;
}

function renderErrorBanner() {
  if (!state.error) return '';
  const tr = t();
  return `
    <div class="m-4 p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3">
      <i data-lucide="alert-circle" width="20" height="20" class="text-red-500 flex-shrink-0 mt-0.5"></i>
      <div class="flex-1">
        <p class="text-red-800 text-sm font-medium">${state.error}</p>
        <button onclick="loadMenuData()" class="text-red-600 text-xs font-bold mt-2 hover:text-red-700">${tr.retry}</button>
      </div>
    </div>`;
}

function renderLoading() {
  const tr = t();
  return `
    <div class="flex justify-center items-center py-12">
      <i data-lucide="loader" width="32" height="32" class="animate-spin text-[#2c3d2f]"></i>
      <span class="ml-2 text-stone-600">${tr.loading}</span>
    </div>`;
}

function renderCategories() {
  const buttons = DEFAULT_CATEGORIES.map(cat => `
    <button onclick="setActiveCategory(${cat.id})"
      class="flex items-center gap-2 px-4 py-2.5 rounded-full whitespace-nowrap text-sm font-semibold transition-all flex-shrink-0 ${
        state.activeCategory === cat.id
          ? 'bg-[#2c3d2f] text-white shadow-md'
          : 'bg-white text-stone-700 border border-stone-200 hover:border-[#2c3d2f]'
      }">
      <i data-lucide="${cat.icon}" width="16" height="16"></i>
      <span>${state.lang === 'TH' ? cat.thName : cat.name}</span>
    </button>`).join('');

  return `<div class="px-4 py-3 overflow-x-auto"><div class="flex gap-2 pb-1">${buttons}</div></div>`;
}

function renderMenuCard(item) {
  const tr = t();
  return `
    <div class="bg-white rounded-2xl border border-stone-200 overflow-hidden hover:shadow-lg transition-shadow">
      <div class="w-full h-32 bg-gradient-to-br from-stone-100 to-stone-200 flex items-center justify-center relative">
        ${item.image
          ? `<img src="${item.image}" alt="${item.th}" class="w-full h-full object-cover" />`
          : `<span class="text-4xl opacity-40">🍜</span>`}
        ${item.isPopular ? `
          <div class="absolute top-2 right-2 bg-orange-500 text-white text-xs font-bold px-2.5 py-1 rounded-full flex items-center gap-1">
            <i data-lucide="sparkles" width="12" height="12"></i> ${tr.popularBadge}
          </div>` : ''}
      </div>
      <div class="p-3">
        <h3 class="font-bold text-stone-900 text-sm mb-1 line-clamp-2">${item.th}</h3>
        <p class="text-xs text-stone-500 mb-3 line-clamp-1">${item.en}</p>
        <div class="flex items-center justify-between">
          <span class="text-lg font-bold text-orange-600">${item.price} ฿</span>
          <button onclick="addToCart('${item.id}')"
            class="bg-[#2c3d2f] hover:bg-[#1a2620] text-white p-2 rounded-lg transition-colors">
            <i data-lucide="plus" width="18" height="18"></i>
          </button>
        </div>
      </div>
    </div>`;
}

function renderMenuGrid() {
  const tr = t();
  const items = getFilteredMenu();
  if (items.length === 0) {
    return `
      <div class="px-4 pb-32">
        <div class="text-center py-12">
          <div class="text-5xl mb-3 opacity-30">🔍</div>
          <p class="text-stone-500 font-medium">${tr.emptyCart}</p>
        </div>
      </div>`;
  }
  return `
    <div class="px-4 pb-32 space-y-3">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        ${items.map(renderMenuCard).join('')}
      </div>
    </div>`;
}

function renderCustomizeModal() {
  const item = state.custModalItem;
  if (!item) return '';
  const tr = t();

  const breadTypeSection = (Number(item.category) === 4 && item.isCustomizable) ? `
    <div>
      <label class="text-xs font-bold text-stone-600 block mb-2">${tr.breadType}</label>
      <div class="grid grid-cols-2 gap-2">
        ${[['bun', '🥯', tr.bun], ['sliced', '🍞', tr.sliced]].map(([id, emoji, text]) => `
          <button onclick="selectBreadType('${id}')"
            class="py-3 px-2 rounded-lg border-2 text-sm font-bold flex flex-col items-center gap-1 transition-all ${
              state.selectedBreadType === id ? 'bg-orange-50 border-[#2c3d2f] text-[#2c3d2f]' : 'bg-white border-stone-200 text-stone-700'
            }">
            <span class="text-2xl">${emoji}</span><span>${text}</span>
          </button>`).join('')}
      </div>
    </div>` : '';

  const sweetnessSection = (Number(item.category) === 3) ? `
    <div>
      <label class="text-xs font-bold text-stone-600 block mb-2">${tr.sweetness}</label>
      <div class="grid grid-cols-3 gap-2">
        ${[['normal', '🍭', tr.sweetNormal], ['less', '🍬', tr.sweetLess], ['none', '🥛', tr.noSweet]].map(([id, emoji, text]) => `
          <button onclick="selectSweetness('${id}')"
            class="py-2.5 px-1 rounded-lg border-2 text-xs font-bold flex flex-col items-center gap-1 transition-all ${
              state.selectedSweetness === id ? 'bg-orange-50 border-[#2c3d2f] text-[#2c3d2f]' : 'bg-white border-stone-200 text-stone-700'
            }">
            <span class="text-xl">${emoji}</span><span>${text}</span>
          </button>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4">
      <div class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm max-h-[90vh] overflow-hidden flex flex-col">
        <div class="bg-[#2c3d2f] text-white p-4 flex justify-between items-center flex-shrink-0">
          <h3 class="font-bold text-sm">${item.th}</h3>
          <button onclick="closeCustomizeModal()" class="text-stone-300 hover:text-white">
            <i data-lucide="x" width="20" height="20"></i>
          </button>
        </div>
        <div class="overflow-y-auto flex-1 p-5 space-y-4">
          ${breadTypeSection}
          ${sweetnessSection}
          <div>
            <label class="text-xs font-bold text-stone-600 block mb-2">📝 ${tr.specialNote}</label>
            <textarea oninput="onNoteInput(this.value)" placeholder="${tr.notePlaceholder}"
              class="w-full border border-stone-200 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#2c3d2f] bg-stone-50 min-h-[90px] resize-none">${escapeHtml(state.customerNote)}</textarea>
          </div>
        </div>
        <div class="border-t border-stone-200 p-4 flex-shrink-0">
          <button onclick="confirmCustomization()"
            class="w-full bg-[#2c3d2f] hover:bg-[#1a2620] text-white font-bold py-3.5 rounded-lg transition-colors flex items-center justify-center gap-2">
            <i data-lucide="check" width="18" height="18"></i> ${tr.confirm}
          </button>
        </div>
      </div>
    </div>`;
}

function renderCartItem(item) {
  return `
    <div class="bg-stone-50 border border-stone-200 p-3 rounded-lg">
      <div class="flex justify-between items-start gap-2 mb-2">
        <div class="flex-1">
          <p class="font-bold text-sm text-stone-900">${item.th}</p>
          <p class="text-xs text-stone-500 truncate">${item[state.lang.toLowerCase()] || item.en}</p>
        </div>
        <button onclick="removeFromCart('${item.uniqueId}')" class="text-stone-400 hover:text-red-500 p-1">
          <i data-lucide="x" width="16" height="16"></i>
        </button>
      </div>

      ${item.customNotes ? `
        <div class="mb-2 bg-orange-50 p-2 rounded border border-orange-100">
          <p class="text-orange-800 text-xs font-bold">⭐ ${item.customNotes}</p>
        </div>` : ''}

      <div class="flex justify-between items-center">
        <span class="font-bold text-orange-600 text-sm">${item.price * item.qty} ฿</span>
        <div class="flex items-center gap-1 bg-white border border-stone-200 rounded-lg p-0.5">
          <button onclick="updateQty('${item.uniqueId}', -1)" class="w-6 h-6 flex items-center justify-center hover:bg-stone-100 rounded">
            <i data-lucide="minus" width="14" height="14"></i>
          </button>
          <span class="w-6 text-center text-xs font-bold">${item.qty}</span>
          <button onclick="updateQty('${item.uniqueId}', 1)" class="w-6 h-6 flex items-center justify-center bg-[#2c3d2f] hover:bg-[#1a2620] text-white rounded">
            <i data-lucide="plus" width="14" height="14"></i>
          </button>
        </div>
      </div>
    </div>`;
}

function renderCartModal() {
  if (!state.isCartOpen) return '';
  const tr = t();
  const totalItems = getTotalItems();
  const totalPrice = getTotalPrice();

  const body = state.cart.length === 0 ? `
    <div class="text-center py-12 text-stone-400">
      <div class="text-5xl mb-3 opacity-30">🛒</div>
      <p class="font-bold text-sm">${tr.emptyCart}</p>
      <p class="text-xs mt-1">${tr.emptyCartSub}</p>
    </div>` : `
    <div class="bg-orange-50 border border-orange-200 p-3 rounded-lg flex items-start gap-2">
      <span class="text-xl">👨‍🍳</span>
      <div>
        <p class="font-bold text-xs text-orange-900">${tr.staffSection}</p>
        <p class="text-xs text-orange-700 font-medium">${tr.staffInstruction}</p>
      </div>
    </div>
    ${state.cart.map(renderCartItem).join('')}`;

  const footer = state.cart.length === 0 ? '' : `
    <div class="border-t border-stone-200 p-4 bg-white flex-shrink-0 space-y-3">
      <div class="flex justify-between items-end">
        <div>
          <p class="text-xs text-stone-500">Total (${totalItems} ${tr.items})</p>
          <p class="text-xs text-[#2c3d2f] font-bold">ยอดรวมสำหรับพนักงาน</p>
        </div>
        <p class="text-2xl font-bold text-orange-600">${totalPrice} ฿</p>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="toggleCart(false)" class="bg-stone-200 text-stone-700 font-bold py-3 rounded-lg text-sm hover:bg-stone-300 transition-colors">
          ${tr.backToMenu}
        </button>
        <button onclick="confirmOrder()" class="bg-[#2c3d2f] hover:bg-[#1a2620] text-white font-bold py-3 rounded-lg text-sm transition-colors">
          ${tr.confirm}
        </button>
      </div>
    </div>`;

  return `
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4">
      <div class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm max-h-[95vh] flex flex-col overflow-hidden">
        <div class="bg-[#2c3d2f] text-white p-4 flex justify-between items-center flex-shrink-0">
          <div>
            <h2 class="font-bold text-base flex items-center gap-2">
              <i data-lucide="shopping-cart" width="16" height="16"></i> ${tr.myOrder}
            </h2>
            <p class="text-xs text-stone-300 mt-1">${tr.showToStaff}</p>
          </div>
          <button onclick="toggleCart(false)" class="p-1 hover:bg-white/20 rounded">
            <i data-lucide="x" width="20" height="20"></i>
          </button>
        </div>
        <div class="overflow-y-auto flex-1 p-4 space-y-3">${body}</div>
        ${footer}
      </div>
    </div>`;
}

// The single function that draws everything. Call this any time `state` changes.
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="bg-stone-50 min-h-screen w-full max-w-md mx-auto font-sans">
      ${renderHeader()}
      ${renderErrorBanner()}
      ${state.isLoading ? renderLoading() : ''}
      ${!state.isLoading ? renderCategories() : ''}
      ${!state.isLoading ? renderMenuGrid() : ''}
      ${renderCustomizeModal()}
      ${renderCartModal()}
    </div>`;

  // Swap every <i data-lucide="..."> placeholder for its actual SVG icon.
  if (window.lucide) {
    window.lucide.createIcons();
  }
}

// ==================== 8. INIT ====================
render();          // draw the initial (loading) screen immediately
loadMenuData();    // then fetch/assign the real menu and render again
</script>
</body>
</html>
