<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaji Pang Admin | จัดการเมนู</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; color: #2D4F3B; }
        .bg-green-deep { background-color: #2D4F3B; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">จัดการเมนูอาหาร</h1>
            <a href="index.html" class="text-sm underline opacity-60">กลับหน้าหลัก</a>
        </div>
        
        <!-- Form -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-900/5 mb-8">
            <h2 class="font-bold mb-4">เพิ่มเมนูใหม่</h2>
            <div class="space-y-3">
                <input type="text" id="name" placeholder="ชื่อเมนู" class="w-full p-3 border rounded-xl bg-[#FDFBF7]">
                <select id="category" class="w-full p-3 border rounded-xl bg-[#FDFBF7]">
                    <option value="แนะนำ">แนะนำ</option>
                    <option value="ทานเล่น">ทานเล่น</option>
                    <option value="อาหารจานหลัก">อาหารจานหลัก</option>
                    <option value="เมนูเส้น">เมนูเส้น</option>
                    <option value="เครื่องดื่ม">เครื่องดื่ม</option>
                    <option value="ขนมปัง">ขนมปัง</option>
                </select>
                <input type="number" id="price" placeholder="ราคา (บาท)" class="w-full p-3 border rounded-xl bg-[#FDFBF7]">
                <input type="text" id="imageUrl" placeholder="URL รูปภาพ (ถ้ามี)" class="w-full p-3 border rounded-xl bg-[#FDFBF7]">
                <button onclick="saveItem()" class="w-full bg-[#2D4F3B] text-white py-3 rounded-xl font-bold shadow-lg shadow-green-900/20 active:scale-95 transition-transform">บันทึกเมนู</button>
            </div>
        </div>

        <h2 class="font-bold mb-4">รายการเมนูทั้งหมด</h2>
        <div id="admin-list" class="space-y-3">
            <!-- Items loaded via JS -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7w2MAQN9LRWivD8B7h0zPyqZhIyGFYJk",
            authDomain: "bhajipang-366db.firebaseapp.com",
            projectId: "bhajipang-366db",
            storageBucket: "bhajipang-366db.firebasestorage.app",
            messagingSenderId: "799553816032",
            appId: "1:799553816032:web:12158ffda4f5826b3e1785",
            measurementId: "G-P2EXTMKD1Y"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'bhajipang-366db';
        const menuRef = collection(db, 'artifacts', appId, 'public', 'data', 'menu');

        // CRUD Operations
        window.saveItem = async () => {
            const name = document.getElementById('name').value;
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value;
            const imageUrl = document.getElementById('imageUrl').value;

            if(!name || !price) return alert("กรุณากรอกชื่อและราคาให้ครบครับ");

            await addDoc(menuRef, { name, category, price: Number(price), imageUrl });
            alert("บันทึกสำเร็จ!");
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
        };

        window.deleteItem = async (id) => {
            if(confirm('คุณต้องการลบเมนูนี้ใช่หรือไม่?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'menu', id));
            }
        };

        // Listen for updates
        signInAnonymously(auth).then(() => {
            onSnapshot(menuRef, (snapshot) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                snapshot.docs.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-900/5 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-[#2D4F3B]">${data.name}</h4>
                                <p class="text-xs opacity-60">${data.category} | ${data.price} ฿</p>
                            </div>
                            <button onclick="deleteItem('${d.id}')" class="text-red-500 font-bold px-3 py-1 rounded-lg">ลบ</button>
                        </div>
                    `;
                });
            });
        });
    </script>
</body>
</html>
